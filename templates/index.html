<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecOps & IAM Cockpit</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #c9d1d9;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            text-align: center;
            max-width: 450px;
        }
        h1 { color: #58a6ff; font-size: 24px; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 14px; margin-bottom: 30px; }
        .btn-sso {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-sso:hover { background-color: #2ea44f; }
        .footer { margin-top: 20px; font-size: 11px; color: #484f58; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ Cockpit SecOps & IAM</h1>
        <p>Plateforme de démonstration d’automatisation de la gouvernance des accès et réponse aux incidents.</p>
        
        <a href="/login" class="btn-sso">Se connecter via Enterprise SSO</a>
        
        <div class="footer">Environnement Local Décentralisé — Architecture Zero-Trust</div>
    </div>
</body>
</html>
