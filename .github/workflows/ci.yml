name: SecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Récupération du code (Checkout)
      uses: actions/checkout@v4

    # -------------------------------------------------------------
    # Étape 2 : Vérification du Code Python (Linter)
    # -------------------------------------------------------------
    - name: 2. Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 3. Installation des dépendances et test de syntaxe
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # Vérifie s il y a des erreurs de syntaxe Python critiques
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # -------------------------------------------------------------
    # Étape 3 : Build de l image Docker (Validation SecOps)
    # -------------------------------------------------------------
    - name: 4. Test de construction de l image Docker
      run: |
        docker build -t cockpit-secops:ci .

